[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes, W = warnings, I = isort
select = ["E", "F", "W", "I"]
# E501 = line too long (we set length above; ignore noisy E501 in long strings)
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*"     = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--tb=short -ra"
