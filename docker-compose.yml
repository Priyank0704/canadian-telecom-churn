# Local-development convenience: `docker compose up` launches the app
# with the host's model + data directories mounted as read-only volumes.
#
# Usage:
#   docker compose up --build           # first time or after Dockerfile changes
#   docker compose up                   # subsequent launches
#   docker compose down                 # stop and remove
#
# Open http://localhost:8501

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: canadian-telecom-churn:latest
    container_name: telecom-churn-app
    ports:
      - "8501:8501"
    volumes:
      # Mount the trained model and processed data read-only from the host.
      # This means a `docker compose up` always uses your latest local model
      # without rebuilding the image.
      - ./models:/home/app/canadian-telecom-churn/models:ro
      - ./data/processed:/home/app/canadian-telecom-churn/data/processed:ro
      - ./reports:/home/app/canadian-telecom-churn/reports:ro
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
